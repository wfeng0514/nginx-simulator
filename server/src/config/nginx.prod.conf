# ============================================================
# nginx 生产环境配置文件
# 特点：安全加固、性能优化、限流、HTTPS、缓存策略
# 适用于生产环境部署
# ============================================================

# === 全局配置 ===
# worker_processes auto;       # 自动匹配 CPU 核心数
# worker_rlimit_nofile 65535;  # 最大文件打开数

events {
    worker_connections  2048;   # 生产环境更高的连接数
    multi_accept        on;     # 一次接受多个连接
    use                 epoll;  # Linux 高性能事件模型
}

http {
    # === 基础配置 ===
    include       mime.types;
    default_type  application/octet-stream;
    server_tokens off;           # ★ 生产环境隐藏 nginx 版本号（安全加固）

    # === 日志配置（生产环境记录关键信息）===
    access_log  /var/log/nginx/access.log  combined buffer=64k flush=5s;
    error_log   /var/log/nginx/error.log   warn;      # 生产环境日志级别 warn

    # === 性能优化 ===
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   30;       # 生产环境较短的 keepalive 超时
    keepalive_requests  100;      # 每个连接最大请求数
    client_max_body_size 10m;     # ★ 生产环境限制上传大小
    client_body_timeout 12s;
    client_header_timeout 12s;
    send_timeout         10s;

    # === Gzip 压缩（生产环境高级别压缩）===
    gzip              on;
    gzip_comp_level   6;          # ★ 生产环境压缩级别 6（平衡 CPU 和带宽）
    gzip_min_length   512;        # 小于 512 字节不压缩
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml application/xml+rss text/javascript;
    gzip_vary         on;
    gzip_proxied      any;        # 对所有代理请求也压缩
    gzip_disable      "msie6";    # 禁用 IE6 的 gzip

    # === 安全配置 ===
    # 隐藏上游代理的后端服务器信息
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    # ============================================================
    # 频率限制配置
    # ============================================================
    # 定义限流区域：每个 IP 每秒最多 10 个请求
    # limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # 连接数限制：每个 IP 最多 5 个并发连接
    # limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ============================================================
    # 场景 1：生产环境上游 - IP 哈希（会话保持）
    # ★ 生产环境使用 ip_hash 确保同一用户始终访问同一服务器
    # ============================================================
    upstream prod_api_backend {
        ip_hash;      # IP 哈希：同一客户端 IP 始终路由到同一后端
        server 10.0.1.10:8080 weight=5 max_fails=3 fail_timeout=30s;
        server 10.0.1.11:8080 weight=5 max_fails=3 fail_timeout=30s;
        server 10.0.1.12:8080 weight=3 max_fails=2 fail_timeout=20s;
        server 10.0.1.13:8080 backup;   # ★ 备用服务器（仅主服务器全部宕机时使用）
        keepalive 32;                     # 保持 32 个到后端的空闲连接
    }

    # ============================================================
    # 场景 2：生产环境上游 - 最少连接 + 加权
    # 适用于处理时间不均匀的请求
    # ============================================================
    upstream prod_static_backend {
        least_conn;   # 最少连接：优先分配给负载最低的服务器
        server 10.0.2.10:8080 weight=3;   # 高性能服务器，权重高
        server 10.0.2.11:8080 weight=2;
        server 10.0.2.12:8080 weight=1;   # 低配服务器，权重低
        keepalive 16;
    }

    # ============================================================
    # 场景 3：生产环境上游 - 加权轮询（默认）
    # ============================================================
    upstream prod_media_backend {
        # 平滑加权轮询（默认算法）
        server 10.0.3.10:8080 weight=4;   # 高配：4 核 CPU
        server 10.0.3.11:8080 weight=2;   # 中配：2 核 CPU
        server 10.0.3.12:8080 weight=2;   # 中配
        server 10.0.3.13:8080 down;       # ★ 标记为宕机（维护中），自动跳过
        keepalive 32;
    }

    # ============================================================
    # HTTP → HTTPS 重定向 Server
    # ★ 生产环境强制 HTTPS
    # ============================================================
    server {
        listen       80;
        server_name  example.com www.example.com;

        # 将所有 HTTP 流量重定向到 HTTPS
        return 301 https://$server_name$request_uri;
    }

    # ============================================================
    # HTTPS 主站 Server
    # ★ 生产环境标准配置：SSL + 安全头 + HSTS
    # ============================================================
    server {
        listen       443 ssl http2;
        server_name  example.com www.example.com;

        # --- SSL/TLS 证书配置 ---
        # ssl_certificate     /etc/nginx/ssl/example.com.crt;
        # ssl_certificate_key /etc/nginx/ssl/example.com.key;
        ssl_protocols       TLSv1.2 TLSv1.3;        # ★ 仅允许安全协议
        ssl_ciphers         HIGH:!aNULL:!MD5;        # ★ 高强度加密套件
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # --- HSTS 安全头（强制浏览器使用 HTTPS）---
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # --- 安全头 ---
        add_header X-Frame-Options "SAMEORIGIN" always;          # 防止点击劫持
        add_header X-Content-Type-Options "nosniff" always;      # 防止 MIME 嗅探
        add_header X-XSS-Protection "1; mode=block" always;      # XSS 过滤
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # --- CORS（生产环境限制来源）---
        # add_header Access-Control-Allow-Origin "https://example.com" always;

        # --- 限流配置 ---
        # limit_req zone=api_limit burst=20 nodelay;
        # limit_conn conn_limit 5;

        # --- 错误页面（生产环境自定义）---
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;

        # 精确匹配 - 首页
        location = / {
            # limit_req zone=api_limit burst=10;
            proxy_pass http://prod_static_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 前缀优先 - 管理后台（严格访问控制）
        location ^~ /admin/ {
            allow 10.0.0.0/8;       # ★ 仅允许内网访问
            allow 172.16.0.0/12;    # ★ 仅允许内网访问
            allow 192.168.0.0/16;   # ★ 仅允许内网访问
            deny  all;               # ★ 拒绝所有外网

            proxy_pass http://prod_api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # 正则匹配 - API 请求
        location ~ ^/api/v[12]/ {
            # limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://prod_api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;    # ★ 生产环境较短超时
            proxy_read_timeout 15s;
            proxy_next_upstream error timeout http_500 http_502 http_503;
            proxy_next_upstream_tries 2;   # 失败重试 2 次
        }

        # 前缀匹配 - 静态资源（长缓存）
        location /static/ {
            root /var/www/prod;
            try_files $uri $uri/ =404;
            # ★ 生产环境强缓存策略
            expires 30d;                     # 静态资源缓存 30 天
            add_header Cache-Control "public, immutable";
            add_header Vary "Accept-Encoding";
            # 限制下载速度（防止带宽滥用）
            # limit_rate 500k;
        }

        # 前缀匹配 - 媒体资源
        location /media/ {
            proxy_pass http://prod_media_backend;
            expires 7d;
            add_header Cache-Control "public";
        }

        # 前缀匹配 - Rewrite 演示：旧路径迁移
        location /v1/ {
            rewrite ^/v1/(.*)$ /api/v1/$1 permanent;  # permanent = 301 永久重定向
        }

        # 默认匹配
        location / {
            proxy_pass http://prod_static_backend;
        }
    }

    # ============================================================
    # API 专用于 Server（api.example.com）
    # ★ 独立域名提供 API 服务
    # ============================================================
    server {
        listen       443 ssl;
        server_name  api.example.com;

        # ssl_certificate     /etc/nginx/ssl/api.example.com.crt;
        # ssl_certificate_key /etc/nginx/ssl/api.example.com.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers   HIGH:!aNULL:!MD5;

        # 频率限制
        # limit_req zone=api_limit burst=30 nodelay;

        # CORS（只允许特定来源）
        add_header Access-Control-Allow-Origin "https://example.com";
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE";
        add_header Access-Control-Allow-Headers "Authorization, Content-Type";

        location / {
            proxy_pass http://prod_api_backend;
            proxy_set_header Host api.example.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
