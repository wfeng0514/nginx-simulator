# ============================================================
# nginx 开发环境配置文件
# 特点：详细日志、宽松超时、CORS 全开、调试友好
# 适用于本地开发、调试和学习 nginx 工作原理
# ============================================================

# === 全局配置 ===
# worker_processes 1;  # 开发环境单进程便于调试

events {
    worker_connections 1024;   # 每个 worker 最大连接数
    # use epoll;               # Linux 下推荐 epoll 事件模型
}

http {
    # === 基础配置 ===
    include       mime.types;
    default_type  application/octet-stream;
    server_tokens on;           # 开发环境显示 nginx 版本号

    # === 日志配置（开发环境详细日志）===
    access_log  /var/log/nginx/access.log  combined;  # 访问日志
    error_log   /var/log/nginx/error.log   debug;     # 错误日志 debug 级别

    # === 性能配置（开发环境）===
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;       # 保持连接超时
    client_max_body_size 100m;  # 开发环境允许大文件上传

    # === Gzip 压缩（开发环境也开启以便测试）===
    gzip              on;
    gzip_comp_level   1;        # 最低压缩级别，压缩快
    gzip_min_length   256;
    gzip_types        text/plain text/css application/json application/javascript text/xml;
    gzip_vary         on;

    # ============================================================
    # 场景 1：上游服务器组 - 加权轮询（默认算法）
    # 模拟后端 API 服务器集群
    # ============================================================
    upstream dev_api_backend {
        # 加权轮询：weight 越高，分配请求越多
        server 127.0.0.1:3001 weight=3;     # 主力服务器，权重 3
        server 127.0.0.1:3002 weight=2;     # 辅助服务器，权重 2
        server 127.0.0.1:3003 weight=1;     # 候选服务器，权重 1
        # server 127.0.0.1:3004 backup;     # 备用服务器（仅当其他服务器宕机时使用）
    }

    # ============================================================
    # 场景 2：上游服务器组 - 最少连接
    # 适用于长连接场景（WebSocket、文件上传等）
    # ============================================================
    upstream dev_ws_backend {
        least_conn;   # 最少连接算法，优先分配给连接数最少的服务器
        server 127.0.0.1:4001;
        server 127.0.0.1:4002;
        server 127.0.0.1:4003;
    }

    # ============================================================
    # 场景 3：上游服务器组 - IP 哈希
    # 同一客户端 IP 始终路由到同一台服务器（会话保持）
    # ============================================================
    upstream dev_session_backend {
        ip_hash;      # IP 哈希算法，适用于需要 session 粘性的场景
        server 127.0.0.1:5001;
        server 127.0.0.1:5002;
    }

    # ============================================================
    # 主 Server 块 - localhost 开发服务器
    # 演示多种 location 匹配规则
    # ============================================================
    server {
        listen       80;
        server_name  localhost;

        # --- CORS 全局配置（开发环境全开）---
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        # --- 自定义错误页面 ---
        error_page  404  /404.html;          # 404 跳转到指定页面
        error_page  500 502 503 504  /50x.html;  # 5xx 错误统一处理

        # --- 场景 A：精确匹配（= 修饰符）---
        # 仅当 URI 完全等于 / 时匹配，优先级最高
        location = / {
            return 200 "欢迎使用 Nginx 模拟器 - 开发环境\n";
        }

        # --- 场景 B：精确匹配 /health ---
        # 健康检查端点，直接返回 200
        location = /health {
            return 200 "OK";
        }

        # --- 场景 C：前缀优先匹配（^~ 修饰符）---
        # 匹配 /admin/ 开头的 URI，阻止后续正则匹配
        # 开发环境仅允许本机访问
        location ^~ /admin/ {
            allow 127.0.0.1;    # 仅允许本机
            deny  all;          # 拒绝其他所有 IP
            return 200 "管理后台 - 仅本机可访问（开发环境）\n";
        }

        # --- 场景 D：正则匹配 - 大小写敏感（~ 修饰符）---
        # 匹配 .png .jpg .gif 结尾的 URI
        location ~ \.(png|jpg|gif)$ {
            # 模拟静态文件响应
            add_header Content-Type "image/png";
            add_header X-Static-File "true";
            return 200 "模拟图片文件: $uri\n";
        }

        # --- 场景 E：正则匹配 - 大小写不敏感（~* 修饰符）---
        # 匹配 .css .js 结尾的 URI（不区分大小写）
        location ~* \.(css|js)$ {
            add_header Content-Type "text/css";
            add_header Cache-Control "no-cache";  # 开发环境不缓存
            return 200 "/* 模拟静态资源: $uri */\n";
        }

        # --- 场景 F：前缀匹配 - 反向代理到上游 API ---
        # 所有 /api/ 请求代理到 upstream
        location /api/ {
            proxy_pass http://dev_api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 30s;   # 开发环境较长超时
            proxy_read_timeout    60s;
        }

        # --- 场景 G：前缀匹配 - WebSocket 代理 ---
        location /ws/ {
            proxy_pass http://dev_ws_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # --- 场景 H：前缀匹配 - Session 服务 ---
        location /session/ {
            proxy_pass http://dev_session_backend;
        }

        # --- 场景 I：前缀匹配 - 静态文件 try_files 演示 ---
        location /static/ {
            root   /var/www/dev;
            # try_files 按顺序尝试文件，找不到则回退
            try_files $uri $uri/ =404;
        }

        # --- 场景 J：Rewrite 演示 ---
        # 旧版 API 路径重写为新版路径
        location /old-api/ {
            rewrite ^/old-api/(.*)$ /api/$1 break;
            proxy_pass http://dev_api_backend;
        }

        # --- 场景 K：重定向演示 ---
        location /redirect {
            return 302 /api/;   # 临时重定向
        }

        # --- 默认前缀匹配 ---
        location / {
            return 200 "Nginx 模拟器 - 请求路径: $uri\n请求方法: $request_method\n";
        }
    }

    # ============================================================
    # 第二个 Server 块 - admin.local 演示虚拟主机
    # 通过不同的 server_name 区分服务
    # ============================================================
    server {
        listen       80;
        server_name  admin.local dev.admin.local;

        # 管理后台服务器 - 开发环境
        location / {
            return 200 "Admin 管理后台（开发环境）\nServer: admin.local\n";
        }

        location /login {
            return 200 "Admin 登录页面（开发环境）\n";
        }
    }

    # ============================================================
    # 第三个 Server 块 - api.local 演示独立 API 服务
    # ============================================================
    server {
        listen       80;
        server_name  api.local dev.api.local;

        # API 专用服务器
        location / {
            proxy_pass http://dev_api_backend;
        }

        # API 文档
        location = /docs {
            return 200 "API 文档（开发环境）\n版本: v1.0.0\n";
        }
    }
}
